<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSOS Advanced Nexus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Share+Tech+Mono&family=Inter:wght@400;700&display=swap');
        :root { --case: #0f172a; --lcd: #94b43b; --ink: #1a2408; --glow: #38bdf8; --success: #16a34a; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: #020617; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- ADVANCED SMS NOTIFICATION --- */
        #notif { position: absolute; top: -150px; left: 50%; transform: translateX(-50%); width: 340px; background: #fff; border-radius: 16px; padding: 18px; box-shadow: 0 25px 50px rgba(0,0,0,0.7); z-index: 9999; border-top: 5px solid var(--success); display: flex; align-items: flex-start; gap: 12px; }
        #notif.active { top: 30px; }
        .notif-icon { background: #dcfce7; border-radius: 50%; padding: 8px; font-size: 20px; }

        /* --- RUGGEDIZED HARDWARE --- */
        .industrial-phone { width: 380px; background: var(--case); border-radius: 60px; padding: 50px 30px; border: 6px solid #334155; position: relative; box-shadow: 0 0 120px rgba(14, 165, 233, 0.1); }
        .industrial-phone::after { content: "RSOS STRATEGIC AGENT • v8.0-ADV"; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron'; font-size: 9px; color: var(--glow); letter-spacing: 3px; opacity: 0.7; }
        
        .bezel { background: #000; padding: 15px; border-radius: 15px; margin-bottom: 25px; box-shadow: inset 0 0 30px #000; border: 1px solid #1e293b; }
        .lcd { background: var(--lcd); height: 280px; border-radius: 6px; padding: 18px; color: var(--ink); font-family: 'Share Tech Mono', monospace; font-size: 14px; line-height: 1.5; position: relative; display: flex; flex-direction: column; }

        /* --- DYNAMIC XP TRACKER --- */
        .progress-zone { margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); }
        .xp-text { font-size: 10px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.15); border-radius: 10px; overflow: hidden; }
        #bar-fill { height: 100%; width: 25%; background: var(--success); transition: width 1.2s ease; }

        .mmi-view { width: 100%; background: #000; color: #4ade80; border: 1px solid #334155; padding: 12px; text-align: center; margin-bottom: 25px; font-family: 'Share Tech Mono'; font-size: 26px; border-radius: 12px; height: 60px; text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); }
        .key-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .k-btn { background: linear-gradient(145deg, #1e293b, #0f172a); height: 55px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #f8fafc; font-size: 22px; font-weight: bold; cursor: pointer; border-bottom: 5px solid #000; }
        .k-btn:active { transform: translateY(4px); border-bottom-width: 1px; }

        .ctrls { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .action-btn { width: 48%; padding: 16px; border-radius: 12px; border: none; color: #fff; font-weight: bold; cursor: pointer; font-size: 12px; font-family: 'Orbitron'; box-shadow: 0 4px 0 #000; }
        .btn-call { background: linear-gradient(180deg, #22c55e, #166534); }
        .btn-hang { background: linear-gradient(180deg, #ef4444, #991b1b); }
    </style>
</head>
<body>

<div id="notif">
    <div class="notif-icon">✅</div>
    <div>
        <strong id="n-title" style="font-size:13px; display:block">ACTION REGISTERED</strong>
        <p id="n-body" style="font-size:11px; color:#475569; margin:4px 0 0 0"></p>
    </div>
</div>

<div class="industrial-phone">
    <div class="bezel">
        <div class="lcd" id="lcd-display">
            <div id="boot-msg" style="text-align:center; padding-top:60px">
                *** RSOS AGENT 8.0 ***<br>
                EC STRATEGIC HUB<br>
                -------------------<br>
                STATUS: ENCRYPTED<br><br>
                DIAL *120# TO BEGIN
            </div>
            <div id="app-ui" style="display:none; height: 100%;">
                <div id="header-bar" style="border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; margin-bottom: 10px;">
                    <b id="user-name"></b> | <span id="user-loc"></span>
                </div>
                <div id="menu-area" style="white-space: pre-wrap; flex-grow: 1;"></div>
                <div class="progress-zone">
                    <div class="xp-text"><span>GPS PROGRESS</span> <span id="rank-name">LEVEL 1</span></div>
                    <div class="bar-bg"><div id="bar-fill"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mmi-buffer" class="mmi-view"></div>

    <div class="ctrls">
        <button class="action-btn btn-call" onclick="onSend()">SEND</button>
        <button class="action-btn btn-hang" onclick="onEnd()">END</button>
    </div>

    <div class="key-grid">
        <div class="k-btn" onclick="type('1')">1</div><div class="k-btn" onclick="type('2')">2</div><div class="k-btn" onclick="type('3')">3</div>
        <div class="k-btn" onclick="type('4')">4</div><div class="k-btn" onclick="type('5')">5</div><div class="k-btn" onclick="type('6')">6</div>
        <div class="k-btn" onclick="type('7')">7</div><div class="k-btn" onclick="type('8')">8</div><div class="k-btn" onclick="type('9')">9</div>
        <div class="k-btn" onclick="type('*')">*</div><div class="k-btn" onclick="type('0')">0</div><div class="k-btn" onclick="type('#')">#</div>
    </div>
</div>

<script>
    let state = "IDLE";
    let user = null;
    let xp = 25;

    const DATABASE = {
        "1010": { name: "Zukisa", type: "JOBSEEKER", loc: "Gqeberha", xp: 30, rank: "Candidate" },
        "2020": { name: "Sizwe", type: "SMME", loc: "East London", xp: 15, rank: "Startup" }
    };

    function type(n) { document.getElementById('mmi-buffer').innerText += n; }

    function onSend() {
        const val = document.getElementById('mmi-buffer').innerText;
        document.getElementById('mmi-buffer').innerText = "";

        if(state === "IDLE") {
            if(val === "*120#") {
                state = "AUTH";
                drawLCD("IDENTITY SECURITY\n-------------------\nEnter 4-Digit PIN:");
            }
            return;
        }

        if(state === "AUTH") {
            if(DATABASE[val]) {
                user = DATABASE[val];
                xp = user.xp;
                state = "MAIN";
                renderMain();
            } else {
                drawLCD("ACCESS DENIED\n\nPIN Not Found.\nTry 1010 or 2020.\n\nPIN:");
            }
            return;
        }

        if(state === "MAIN") {
            if(val === "1") { state = "GPS_BRANCH"; renderGPSBranch(); }
            else if(val === "2") { state = "MATCH"; renderMatch(); }
            else if(val === "3") { state = "HUB"; renderHub(); }
            else if(val === "0") onEnd();
        } 
        else if(state === "GPS_BRANCH") {
            if(val === "1") { state = "PATH_A"; renderPathA(); }
            else if(val === "2") { state = "PATH_B"; renderPathB(); }
            else if(val === "9") { state = "MAIN"; renderMain(); }
        }
        else if(state === "PATH_A" || state === "PATH_B" || state === "MATCH") {
            if(val === "1" || val === "2") {
                executeAction(val);
            } else if(val === "9") {
                state = "MAIN";
                renderMain();
            }
        }
    }

    function renderMain() {
        showUI();
        const gpsLabel = user.type === "JOBSEEKER" ? "Career Pathing" : "Business Growth";
        setMenu(`1 ${gpsLabel}\n2 Match/Apply\n3 Ecosystem Stats\n0 Exit`);
    }

    function renderGPSBranch() {
        if(user.type === "JOBSEEKER") {
            setMenu(`SELECT CATEGORY:\n1 Tech/Admin (SETA A)\n2 Trade/Logistics (SETA B)\n\n9 Back`);
        } else {
            setMenu(`SELECT FOCUS:\n1 Compliance (Tax/Legal)\n2 Market Access (Tenders)\n\n9 Back`);
        }
    }

    function renderPathA() {
        const title = user.type === "JOBSEEKER" ? "TECH PATH" : "COMPLIANCE";
        const act = user.type === "JOBSEEKER" ? "Apply: Coding Bootcamp" : "Apply: SARS Prep";
        setMenu(`${title} GAP FOUND\nNext Step Required:\n1 ${act}\n\n9 Back`);
    }

    function renderPathB() {
        const title = user.type === "JOBSEEKER" ? "TRADE PATH" : "MARKET ACCESS";
        const act = user.type === "JOBSEEKER" ? "Apply: Forklift Cert" : "Apply: ESD Programme";
        setMenu(`${title} GAP FOUND\nNext Step Required:\n1 ${act}\n\n9 Back`);
    }

    function renderMatch() {
        const m1 = user.type === "JOBSEEKER" ? "Internship (EL)" : "SEFA Loan (R100k)";
        const m2 = user.type === "JOBSEEKER" ? "Retail Role (GQ)" : "SAB Mentorship";
        setMenu(`NEW MATCHES FOUND:\n1 ${m1}\n2 ${m2}\n\n9 Back`);
    }

    function renderHub() {
        setMenu(`ECOSYSTEM PULSE:\n- SETA Partners: 6 Active\n- Hiring Hubs: Mthatha, EL\n- SMME Grants: 4 Open\n\n9 Back`);
    }

    function executeAction(opt) {
        xp = Math.min(xp + 25, 100);
        const msg = user.type === "JOBSEEKER" ? "Job application & GPS tracking updated." : "Business grant interest logged.";
        triggerNotif("LEVEL UP!", msg);
        state = "MAIN";
        renderMain();
    }

    function setMenu(txt) {
        document.getElementById('menu-area').innerText = txt;
        document.getElementById('user-name').innerText = user.name;
        document.getElementById('user-loc').innerText = user.loc;
        document.getElementById('bar-fill').style.width = xp + "%";
        document.getElementById('rank-name').innerText = xp >= 75 ? "EXPERT" : (xp >= 50 ? "PARTICIPANT" : "CANDIDATE");
    }

    function triggerNotif(title, body) {
        document.getElementById('n-title').innerText = title;
        document.getElementById('n-body').innerText = body;
        const n = document.getElementById('notif');
        n.classList.add('active');
        setTimeout(() => n.classList.remove('active'), 5000);
    }

    function showUI() {
        document.getElementById('boot-msg').style.display = "none";
        document.getElementById('app-ui').style.display = "flex";
    }

    function drawLCD(txt) {
        document.getElementById('boot-msg').style.display = "block";
        document.getElementById('app-ui').style.display = "none";
        document.getElementById('boot-msg').innerText = txt;
    }

    function onEnd() {
        state = "IDLE"; user = null; xp = 25;
        drawLCD("*** RSOS AGENT 8.0 ***\n\nSESSION CLOSED\n\nDIAL *120#");
    }
</script>
</body>
</html>
